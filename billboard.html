<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Billboard - HTML-in-Canvas</title>
    <link rel="stylesheet" href="css/theme.css">
    <script type="module" src="js/material-web-bundle.js"></script>
    <style>
        ::selection {
            color: black;
            background-color: yellow;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #8DB8F9;
            color: var(--md-sys-color-on-background);
            font-family: 'Inter', system-ui, sans-serif;
        }

        #gl-canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #billboard-content {
            width: 1024px;
            height: 576px;
            background-color: #0a0a0f;
            color: #fff;
            padding: 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        #scribble-container {
            width: 100%;
            height: 400px;
            display: grid;
            place-items: center;
            position: relative;
        }

        .line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .is-animated .line {
            animation-name: drawLine, fadeDown;
            animation-duration: 4s, 4s;
            animation-timing-function: linear, linear;
            animation-fill-mode: forwards, forwards;
        }

        .line1 {
            animation-delay: 0s, 3.6s;
        }

        .line2 {
            animation-delay: 1.4s, 3.6s;
        }

        .line3 {
            animation-delay: 1.85s, 3.6s;
        }

        .line4 {
            animation-delay: 2.85s, 3.6s;
        }

        @keyframes drawLine {
            to {
                stroke-dashoffset: 0;
            }
        }

        @keyframes fadeDown {
            0% {
                opacity: 1;
                translate: 0 0px;
                filter: brightness(1) grayscale(0);
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
                translate: 0 40px;
                filter: brightness(2) grayscale(1);
            }
        }

            offset-rotate: 0deg;
        }

        .is-animated .pen {
            animation-name: movePenAlongPath, fadeOut;
            animation-duration: 3s, 3s;
            animation-timing-function: linear, linear;
            animation-fill-mode: forwards, forwards;
        }

        @keyframes movePenAlongPath {
            to {
                offset-distance: 100%;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        .gemini1 {
            transform-origin: 0;
        }

        .is-animated .gemini1 {
            animation-name: move;
            animation-duration: 1.2s;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        .gemini2 {
            opacity: 0;
            translate: 0px 40px;
            transform-origin: 0;
        }

        .is-animated .gemini2 {
            animation-name: appear, move;
            animation-duration: 0.6s, 1.2s;
            animation-delay: 0.2s, 0.2s;
            animation-timing-function: linear, linear;
            animation-fill-mode: forwards, forwards;
        }

        @keyframes move {
            from {
                scale: 1;
            }

            to {
                scale: 0;
            }
        }

        @keyframes appear {
            0% {
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        .badge {
            background: #4285f4;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 40px;
            font-weight: 700;
        }

        p {
            margin: 0;
            font-size: 20px;
            opacity: 0.8;
            max-width: 650px;
        }

        .badge {
            background: var(--md-sys-color-primary);
            color: var(--md-sys-color-on-primary);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .debug-info {
            position: absolute;
            top: 24px;
            left: 24px;
            background: #fff;
            color: #000;
            padding: 12px 20px;
            border-radius: 12px;
            font-family: inherit;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px #000;
            z-index: 100;
            pointer-events: none;
        }

        {

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const canvas = document.getElementById('gl-canvas');
        const billboardContent = document.getElementById('billboard-content');

        // Three.js Scene Setup (High Quality)
        const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            alpha: true
        });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearAlpha(0);
        renderer.setClearColor(0x000000, 0);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

        // Adjust camera to look from closer and higher
        camera.position.set(60, 20, 50);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        controls.target.set(0, 10, 0);
        controls.update();

        // 🎬 Camera Intro Animation Setup
        let introStartTime = performance.now();
        const introDuration = 2200; // ms

        // Start (far cinematic position)
        const camStartPos = new THREE.Vector3(80, 50, 140);

        // End (your current composition)
        const camEndPos = new THREE.Vector3(60, 20, 50);

        // Target animation (important for OrbitControls sync)
        const targetStart = new THREE.Vector3(0, 0, 0);
        const targetEnd = new THREE.Vector3(0, 10, 0);

        // Flag so it runs only once
        let introFinished = false;

        // Environment & Lighting (Enhanced for PBR)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const grid = new THREE.GridHelper(100, 20);
        scene.add(grid);
        const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0);
        scene.add(hemisphereLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);
        directionalLight.position.set(20, 40, 20);
        directionalLight.castShadow = true;
        directionalLight.shadow.camera.top = 20;
        directionalLight.shadow.camera.bottom = -20;
        directionalLight.shadow.camera.left = -20;
        directionalLight.shadow.camera.right = 20;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.bias = -0.0001;
        scene.add(directionalLight);

        // Ground to catch shadows
        const groundGeom = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.ShadowMaterial({ opacity: 0.3 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Texture Setup
        const billboardTexture = new THREE.Texture();
        billboardTexture.format = THREE.RGBAFormat;
        billboardTexture.type = THREE.UnsignedByteType;
        billboardTexture.internalFormat = 'RGBA8';
        billboardTexture.minFilter = THREE.LinearFilter;
        billboardTexture.magFilter = THREE.LinearFilter;
        billboardTexture.generateMipmaps = false;
        billboardTexture.colorSpace = THREE.SRGBColorSpace;

        // "Raw WebGL" Hijack: Initialize the texture manually to avoid the 'immutable' 
        // texStorage2D path used by WebGL2-aware renderers like Three.js.
        const gl = renderer.getContext();
        const webglTexture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, webglTexture);

        // Explicitly allocate storage with texImage2D (NOT texStorage2D)
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1024, 576, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);

        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

        // Map the raw GL texture to the Three.js texture object
        renderer.properties.get(billboardTexture).__webglTexture = webglTexture;
        renderer.properties.get(billboardTexture).__version = billboardTexture.version;

        const screenMaterial = new THREE.MeshBasicMaterial({
            map: billboardTexture,
            transparent: false
        });

        // Load Billboard Model
        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);

        let screenMesh = null;
        let billboardBounds = null;

        loader.load('./assets/Billboard.glb', (gltf) => {
            const model = gltf.scene;

            model.rotation.y = 5.4;
            scene.add(model);

            // Enable only casting shadows for the model (prevent self-shadowing)
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = false;

                    if (child.name.toLowerCase().includes('screen') || child.name.toLowerCase().includes('display')) {
                        screenMesh = child;
                        child.material = screenMaterial;

                        // Compute bounds once
                        child.geometry.computeBoundingBox();
                        const box = child.geometry.boundingBox;
                        billboardBounds = {
                            width: box.max.x - box.min.x,
                            height: box.max.y - box.min.y
                        };
                    }
                }
            });

            // If no screen found by name, let's just make a plane for demonstration
            if (!screenMesh) {
                console.warn('Screen mesh not found in GLB. Falling back to custom plane.');
                const fallbackGeom = new THREE.PlaneGeometry(6.9, 3);
                screenMesh = new THREE.Mesh(fallbackGeom, screenMaterial);
                screenMesh.position.set(0, 15, 0);
                screenMesh.rotation.y = 0.69;
                screenMesh.scale.set(2.67, 2.67, 2.67);
                scene.add(screenMesh);

                screenMesh.geometry.computeBoundingBox();
                const box = screenMesh.geometry.boundingBox;
                billboardBounds = {
                    width: box.max.x - box.min.x,
                    height: box.max.y - box.min.y
                };
            }
        });

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);

        let lastRestartTime = performance.now();
        const animationCycleDuration = 5500;

        function restartAnimations() {
            const container = document.getElementById('scribble-container');
            if (container) {
                container.classList.remove('is-animated');
                container.offsetHeight; // force reflow
                container.classList.add('is-animated');
            }
            lastRestartTime = performance.now();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();


            // 🎬 Intro Camera Animation
            if (!introFinished) {
                const elapsed = performance.now() - introStartTime;
                const t = Math.min(elapsed / introDuration, 1);

                // Smooth cinematic easing (easeOutCubic)
                const ease = 1 - Math.pow(1 - t, 3);

                // Animate camera position
                camera.position.lerpVectors(camStartPos, camEndPos, ease);

                // Animate controls target
                controls.target.lerpVectors(targetStart, targetEnd, ease);

                controls.update();
                camera.lookAt(controls.target);

                if (t >= 1) {
                    introFinished = true;
                }
            }

            const currentTime = performance.now();
            if (currentTime - lastRestartTime > animationCycleDuration) {
                restartAnimations();
            }

            // 1. Update Texture from HTML Element (Every Frame)
            const gl = renderer.getContext();
            const textureProperties = renderer.properties.get(billboardTexture);

            if (textureProperties && textureProperties.__webglTexture && gl.texElementImage2D) {
                const webglTexture = textureProperties.__webglTexture;
                gl.bindTexture(gl.TEXTURE_2D, webglTexture);
                gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

                try {
                    gl.texElementImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, billboardContent);
                } catch (err) {
                    if (window.debugLogErr === undefined) {
                        console.error('texElementImage2D failed:', err);
                        window.debugLogErr = true;
                    }
                }
            }

            // 2. Interactivity Synchronization
            if (canvas.getElementTransform && screenMesh && billboardBounds) {
                const threeToDOMMatrix = (m) => {
                    const e = m.elements;
                    const dom = new DOMMatrix();
                    // Explicitly map Three.js Column-Major to DOMMatrix Row-Major
                    dom.m11 = e[0]; dom.m12 = e[4]; dom.m13 = e[8]; dom.m14 = e[12];
                    dom.m21 = e[1]; dom.m22 = e[5]; dom.m23 = e[9]; dom.m24 = e[13];
                    dom.m31 = e[2]; dom.m32 = e[6]; dom.m33 = e[10]; dom.m34 = e[14];
                    dom.m41 = e[3]; dom.m42 = e[7]; dom.m43 = e[11]; dom.m44 = e[15];
                    return dom;
                };

                screenMesh.updateMatrixWorld();

                // Get the latest bounds (in case the user modified them)
                screenMesh.geometry.computeBoundingBox();
                const box = screenMesh.geometry.boundingBox;
                const width = box.max.x - box.min.x;
                const height = box.max.y - box.min.y;

                // Map 1024x576 element to Three.js mesh local bounds
                // Element (0,0) -> Mesh (minX, maxY) because Y is up in 3D
                const localTransform = new DOMMatrix()
                    .translate(box.min.x, box.max.y, 0)
                    .scale(width / 1024, -height / 576, 1);

                const mvp = new DOMMatrix()
                    .translate(window.innerWidth / 2, window.innerHeight / 2)
                    .scale(window.innerWidth / 2, -window.innerHeight / 2, 1)
                    .multiply(threeToDOMMatrix(camera.projectionMatrix))
                    .multiply(threeToDOMMatrix(camera.matrixWorldInverse))
                    .multiply(threeToDOMMatrix(screenMesh.matrixWorld))
                    .multiply(localTransform);

                const syncT = canvas.getElementTransform(billboardContent, mvp);
                if (syncT) {
                    billboardContent.style.transformOrigin = '0 0';
                    billboardContent.style.transform = syncT.toString();
                    billboardContent.style.zIndex = 10;
                    billboardContent.style.pointerEvents = 'auto';
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
