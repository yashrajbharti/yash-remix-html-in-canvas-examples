<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>WebGL Liquid Glass Take 2</title>
    <link rel="stylesheet" href="css/theme.css">
    <script type="module" src="js/material-web-bundle.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      
      
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #glass-element {
      position: absolute;
      width: 300px;
      height: 200px;
      /* Invisible interactable area for dragging */
      cursor: grab;
      touch-action: none;
      border-radius: 20px;
      z-index: 10;
    }

    #glass-element:active {
      cursor: grabbing;
    }
  </style>
</head>

<body>

  <canvas id="gl-canvas" layoutsubtree>
    <div id="ui-container"
      style="width: 100vw; height: 100vh; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); display: flex; align-items: center; justify-content: center; color: white; box-sizing: border-box;">
      <div
        style="background: rgba(255,255,255,0.1); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3);">
        <h1 style="margin: 0 0 20px 0; font-family: sans-serif;">Liquid Glass UI</h1>
        <p style="margin: 0 0 30px 0; font-size: 18px; max-width: 400px; line-height: 1.5;">Drag the glass element
          around to see how WebGL refracts this auto-generated HTML content using texElementImage2D.</p>
        <button
          style="padding: 12px 24px; font-size: 16px; border-radius: 8px; border: none; background: white; color: #1e3c72; cursor: pointer; font-weight: bold; transition: transform 0.2s;"
          onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">Interactive
          Button</button>
      </div>
    </div>
  </canvas>
  <div id="glass-element"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gl-matrix/2.8.1/gl-matrix-min.js"></script>
  <script>
    const canvas = document.getElementById('gl-canvas');
    const gl = canvas.getContext('webgl2', { alpha: false, premultipliedAlpha: false });

    if (!gl) {
      alert('WebGL2 not supported');
      throw new Error('WebGL2 not supported');
    }

    const glassEl = document.getElementById('glass-element');

    // -- Draggable Logic --
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    // Initialize at center
    let glassX = window.innerWidth / 2;
    let glassY = window.innerHeight / 2;
    const glassWidth = 300;
    const glassHeight = 200;

    function updateGlassDOM() {
      // getElementTransform handles the sync now, so we don't manually apply left/top
      // glassEl.style.left = `${glassX - glassWidth / 2}px`;
      // glassEl.style.top = `${glassY - glassHeight / 2}px`;
    }
    updateGlassDOM();

    glassEl.addEventListener('pointerdown', (e) => {
      isDragging = true;
      glassEl.setPointerCapture(e.pointerId);
      dragOffsetX = e.clientX - glassX;
      dragOffsetY = e.clientY - glassY;
    });

    glassEl.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      glassX = e.clientX - dragOffsetX;
      glassY = e.clientY - dragOffsetY;
      updateGlassDOM();
    });

    window.addEventListener('pointerup', () => {
      isDragging = false;
    });

    const uiContainer = document.getElementById('ui-container');

    const bgTexture = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, bgTexture);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

    // -- Shader Sources --

    // Background Shader
    const vsBackground = `#version 300 es
  layout(location = 0) in vec3 aPosition;
  layout(location = 1) in vec2 aTexCoord;
  out vec2 vTexCoord;
  void main() {
    gl_Position = vec4(aPosition, 1.0);
    // UI texture flipped Y
    vTexCoord = vec2(aTexCoord.x, 1.0 - aTexCoord.y);
  }`;

    const fsBackground = `#version 300 es
  precision highp float;
  in vec2 vTexCoord;
  uniform sampler2D uBackgroundTex;
  out vec4 fragColor;
  void main() {
    fragColor = texture(uBackgroundTex, vTexCoord);
  }`;

    // Glass Shader
    const vsGlass = `#version 300 es
  layout(location = 0) in vec3 aPosition;
  layout(location = 1) in vec2 aTexCoord;
  uniform mat4 uMVP;
  out vec2 vTexCoord;
  void main() {
    gl_Position = uMVP * vec4(aPosition, 1.0);
    vTexCoord = aTexCoord;
  }`;

    const fsGlass = `#version 300 es
  precision highp float;
  in vec2 vTexCoord;
  
  uniform sampler2D uBackgroundTex;
  uniform sampler2D uDispTex;
  uniform sampler2D uSpecTex;
  uniform vec2 uResolution;
  
  out vec4 fragColor;

  void main() {
    // HTML is top-down, gl_FragCoord is bottom-up
    vec2 baseBgUV = gl_FragCoord.xy / uResolution;
    baseBgUV.y = 1.0 - baseBgUV.y; 

    // Displacement Math (Liquid Glass Physics)
    vec4 dispColor = texture(uDispTex, vTexCoord);
    vec2 displacement = (dispColor.rg - 0.5) * 2.0;
    
    // Configurable Refraction Strength
    float refStr = 0.08; 
    
    // Chromatic Aberration offset
    float chromAb = 0.01;

    // Sample Refracted Background
    float r = texture(uBackgroundTex, baseBgUV + displacement * (refStr + chromAb)).r;
    float g = texture(uBackgroundTex, baseBgUV + displacement * refStr).g;
    float b = texture(uBackgroundTex, baseBgUV + displacement * (refStr - chromAb)).b;
    vec3 refractedColor = vec3(r, g, b);

    // Optional: Boost brightness/saturation like curved glass concentrating light
    refractedColor *= 1.1;

    // Specular Highlight mapping
    vec4 specular = texture(uSpecTex, vTexCoord);
    // Add specular highlight over the refracted color using its intensity
    vec3 finalColor = refractedColor + (specular.rgb * specular.a * 1.5);
    
    fragColor = vec4(finalColor, 1.0);
  }`;

    function compileShader(type, src) {
      const shader = gl.createShader(type);
      gl.shaderSource(shader, src);
      gl.compileShader(shader);
      if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
        console.error(gl.getShaderInfoLog(shader));
      }
      return shader;
    }

    const progBg = gl.createProgram();
    gl.attachShader(progBg, compileShader(gl.VERTEX_SHADER, vsBackground));
    gl.attachShader(progBg, compileShader(gl.FRAGMENT_SHADER, fsBackground));
    gl.linkProgram(progBg);

    const progGlass = gl.createProgram();
    gl.attachShader(progGlass, compileShader(gl.VERTEX_SHADER, vsGlass));
    gl.attachShader(progGlass, compileShader(gl.FRAGMENT_SHADER, fsGlass));
    gl.linkProgram(progGlass);

    // -- Quad Geometry --
    const quadVao = gl.createVertexArray();
    gl.bindVertexArray(quadVao);

    // Pos: -1 to 1 square
    const posBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      -1, -1, 0, 1, -1, 0, -1, 1, 0, 1, 1, 0
    ]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(0);
    gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);

    // UV: 0 to 1 square
    const uvBuffer = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, uvBuffer);
    // HTML UVs: TopLeft is 0,0, but WebGL is BottomLeft. We'll map to standard WebGL layout and fix in shader if needed
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([
      0, 1, 1, 1, 0, 0, 1, 0
    ]), gl.STATIC_DRAW);
    gl.enableVertexAttribArray(1);
    gl.vertexAttribPointer(1, 2, gl.FLOAT, false, 0, 0);

    // -- Load External Textures --
    function loadTexture(url) {
      const tex = gl.createTexture();
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0, 0, 0, 255]));
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
      gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

      const img = new Image();
      img.onload = () => {
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
      };
      img.src = url;
      return tex;
    }

    const dispTex = loadTexture('assets/liquid_glass_reference/displacement-map-z1p3yi.png');
    const specTex = loadTexture('assets/liquid_glass_reference/specular-map-z1p3yi.png');

    // -- Render Loop --
    function render() {
      if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        gl.viewport(0, 0, canvas.width, canvas.height);
      }

      // Update UI Texture every frame if API exists
      if (gl.texElementImage2D) {
        // console.log("texElementImage2D exists so trying to draw")
        gl.bindTexture(gl.TEXTURE_2D, bgTexture);
        gl.texElementImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, uiContainer);
      }

      gl.clearColor(0, 0, 0, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      // 1. Draw Background
      gl.useProgram(progBg);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, bgTexture);
      gl.uniform1i(gl.getUniformLocation(progBg, 'uBackgroundTex'), 0);

      gl.bindVertexArray(quadVao);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      // 2. Draw Glass Quad
      gl.useProgram(progGlass);

      // Bind uniforms
      gl.uniform2f(gl.getUniformLocation(progGlass, 'uResolution'), canvas.width, canvas.height);

      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, bgTexture);
      gl.uniform1i(gl.getUniformLocation(progGlass, 'uBackgroundTex'), 0);

      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, dispTex);
      gl.uniform1i(gl.getUniformLocation(progGlass, 'uDispTex'), 1);

      gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, specTex);
      gl.uniform1i(gl.getUniformLocation(progGlass, 'uSpecTex'), 2);

      // Calculate Matrix mapping from glass coordinates to Clip Space
      // Screen is w, h
      const proj = mat4.create();
      mat4.ortho(proj, 0, canvas.width, canvas.height, 0, -1, 1);

      const model = mat4.create();
      // Translate to center of glass
      mat4.translate(model, model, [glassX, glassY, 0]);
      // Scale by half width/height (quad goes from -1 to 1 = width 2)
      mat4.scale(model, model, [glassWidth / 2, glassHeight / 2, 1]);

      const mvp = mat4.create();
      mat4.multiply(mvp, proj, model);

      gl.uniformMatrix4fv(gl.getUniformLocation(progGlass, 'uMVP'), false, mvp);

      if (canvas.getElementTransform) {
        // 1. Convert the MVP matrix to a DOMMatrix
        const mvpDOM = new DOMMatrix(Array.from(mvp));

        // 2. Element CSS pixels -> WebGL Model Space
        // Element is 'glassWidth' x 'glassHeight'. Quad geometry is -1 to 1 (size 2).
        const toGLModel = new DOMMatrix()
          // Scale pixels to 2 units, flip Y (CSS down, GL up)
          .scale(2 / glassWidth, -2 / glassHeight, 1)
          // Center the origin: (0,0) becomes (-width/2, -height/2) before scaling
          .translate(-glassWidth / 2, -glassHeight / 2);

        // 3. WebGL Clip Space -> Canvas CSS pixels (Viewport Transform)
        const toCSSViewport = new DOMMatrix()
          // Move center (0,0) to center of canvas
          .translate(canvas.width / 2, canvas.height / 2)
          // Scale normalized clip (-1..1) to viewport size
          .scale(canvas.width / 2, -canvas.height / 2, 1);

        // 4. Combine: Viewport * MVP * Model
        const finalTransform = toCSSViewport.multiply(mvpDOM).multiply(toGLModel);

        const transform = canvas.getElementTransform(glassEl, finalTransform);
        if (transform) {
          // Must origin transform from top-left because our math assumes (0,0) mapped to origin in DOM geometry steps
          glassEl.style.transformOrigin = '0 0';
          glassEl.style.transform = transform.toString();
          // Clear manual offsets just in case
          glassEl.style.left = '0';
          glassEl.style.top = '0';
        }
      }

      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>

</body>

</html>
