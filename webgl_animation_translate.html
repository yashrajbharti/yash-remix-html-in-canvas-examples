<!DOCTYPE html>
<html lang="en">

<head>
    <title>three.js webgl - animation - keyframes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <link rel="stylesheet" href="css/theme.css">
    <style>
        body {
            margin: 0;
            background-color: var(--md-sys-color-surface);
            color: var(--md-sys-color-on-surface);
            font-family: 'Roboto', 'Inter', system-ui, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overscroll-behavior: none;
        }

        a {
            color: var(--md-sys-color-on-primary);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            text-decoration: underline;
        }

        #info {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            max-width: 90%;
            padding: 16px 24px;
            box-sizing: border-box;
            text-align: center;
            color: var(--md-sys-color-surface);
            user-select: none;
            pointer-events: none;
            z-index: 10;
        }

        a,
        button,
        input,
        select {
            pointer-events: auto;
        }

        #container {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>

    <div id="container"></div>

    <div id="info">
        <a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> webgl - animation - keyframes<br />
        Model: <a href="https://artstation.com/artwork/1AGwX" target="_blank" rel="noopener">Littlest Tokyo</a> by
        <a href="https://artstation.com/glenatron" target="_blank" rel="noopener">Glen Fox</a>, CC Attribution.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@latest/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@latest/examples/jsm/"
            }
        }
    </script>

    <script type="module">

        import * as THREE from 'three';

        import Stats from 'three/addons/libs/stats.module.js';

        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Sky } from 'three/addons/objects/Sky.js';

        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        let mixer;

        const timer = new THREE.Timer();
        timer.connect(document);
        const container = document.getElementById('container');

        const stats = new Stats();
        container.appendChild(stats.dom);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // Sky

        const sky = new Sky();

        const uniforms = sky.material.uniforms;
        uniforms['turbidity'].value = 0;
        uniforms['rayleigh'].value = 3;
        uniforms['mieDirectionalG'].value = 0.7;
        uniforms['cloudElevation'].value = 1;
        uniforms['sunPosition'].value.set(- 0.8, 0.19, 0.56); // elevation: 11, azimuth: -55

        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const environment = pmremGenerator.fromScene(sky).texture;
        scene.background = environment;
        scene.environment = environment;

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 100);
        camera.position.set(5, 2, 8);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.7, 0);
        controls.update();

        const dracoLoader = new DRACOLoader();
        dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');

        const loader = new GLTFLoader();
        loader.setDRACOLoader(dracoLoader);
        loader.load('./assets/LittlestTokyo.glb', function (gltf) {

            const model = gltf.scene;
            model.position.set(1, 1, 0);
            model.scale.set(0.01, 0.01, 0.01);
            scene.add(model);

            mixer = new THREE.AnimationMixer(model);
            mixer.clipAction(gltf.animations[0]).play();

            renderer.setAnimationLoop(animate);

        }, undefined, function (e) {

            console.error(e);

        });

        window.onresize = function () {

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);

        };

        function animate() {

            timer.update();

            const delta = timer.getDelta();

            mixer.update(delta);

            controls.update();

            stats.update();

            renderer.render(scene, camera);

        }


    </script>

</body>

</html>
