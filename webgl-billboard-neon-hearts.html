<!doctype html>
<meta charset="utf-8" />
<title>WebGL Billboard - Neon Hearts</title>
<link rel="stylesheet" href="css/theme.css">
<script type="module" src="js/material-web-bundle.js"></script>

<style>
  body {
    margin: 0;
    overflow: hidden;



  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    pointer-events: none;
    font-size: 14px;
    color: rgba(255, 255, 255, 0.7);
    text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
  }

  /* HTML-in-Canvas Renderer Bounding Box */
  #draw_element {
    width: 800px;
    height: 800px;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* Outer UI Structure */
  .neon-panel {
    position: relative;
    width: 600px;
    padding: 40px;
    border-radius: 30px;
    box-sizing: border-box;
    /* Neon dynamic background variable */
    --hue: 280;
    background: linear-gradient(135deg, hsl(var(--hue), 80%, 30%) 0%, hsl(calc(var(--hue) + 60), 100%, 20%) 100%);
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 2px rgba(255, 255, 255, 0.1);
    display: flex;
    flex-direction: column;
    gap: 30px;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  /* Internal Frosted Frame */
  .inner-container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  h2 {
    margin: 0 0 10px 0;
    font-size: 38px;
    font-weight: 800;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
  }

  /* Slider Styling */
  .slider-wrapper {
    display: flex;
    flex-direction: column;
    gap: 15px;
  }

  .slider-wrapper label {
    font-size: 16px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .cool-slider {
    -webkit-appearance: none;
    width: 100%;
    height: 14px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.3);
    outline: none;
    box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.5);
    position: relative;
    cursor: pointer;
  }

  .cool-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 -3px 5px rgba(0, 0, 0, 0.2);
    transition: transform 0.1s;
  }

  .cool-slider::-webkit-slider-thumb:hover {
    transform: scale(1.3);
  }

  /* Secondary Inputs */
  .custom-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 15px;
    border-radius: 12px;
    color: white;
    font-size: 18px;
    font-family: inherit;
    box-sizing: border-box;
    box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
  }

  .custom-input:focus {
    outline: none;
    border-color: rgba(255, 255, 255, 0.5);
    background: rgba(0, 0, 0, 0.4);
  }

  /* Emojis */
  .emoji-bar {
    display: flex;
    justify-content: space-around;
    padding: 20px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 20px;
    position: relative;
  }

  .emoji {
    font-size: 36px;
    user-select: none;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    z-index: 10;
  }

  .emoji:hover {
    transform: scale(1.3);
  }

  /* Insta-Heart Explosion Animation */
  @keyframes explode-up {
    0% {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    30% {
      transform: scale(1.8) translateY(-30px);
      opacity: 0.9;
    }

    100% {
      transform: scale(2.5) translateY(-150px);
      opacity: 0;
    }
  }

  .exploding-emoji {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    animation: explode-up 1.2s ease-out forwards;
    font-size: 36px;
    filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.5));
  }
</style>

<div id="info">
  Arrow Keys: Look Around<br>
  WASD: Move Camera<br>
</div>

<canvas id="gl-canvas" layoutsubtree="true">
  <div id="draw_element">
    <div class="neon-panel" id="main-panel">
      <h2>Neon Control</h2>

      <div class="inner-container">
        <div class="slider-wrapper">
          <label>Shift Gradient Hue</label>
          <input type="range" id="gradient-slider" class="cool-slider" min="0" max="360" value="280">
        </div>

        <div class="slider-wrapper">
          <label>Status Tag</label>
          <input type="text" class="custom-input" value="Floating in Space 🚀">
        </div>
      </div>

      <div class="emoji-bar" id="emoji-bar">
        <div class="emoji">💖</div>
        <div class="emoji">🔥</div>
        <div class="emoji">✨</div>
        <div class="emoji">🎉</div>
      </div>
    </div>
  </div>
</canvas>

<script src="js/gl-matrix.js"></script>
<script>
  // Setup logic for UI interactions
  const glMatrix = { vec3: window.vec3, mat4: window.mat4 };
  const mainPanel = document.getElementById('main-panel');
  const gradientSlider = document.getElementById('gradient-slider');
  const emojiBar = document.getElementById('emoji-bar');

  // Background Gradient shift when dragging slider
  gradientSlider.addEventListener('input', (e) => {
    mainPanel.style.setProperty('--hue', e.target.value);
  });

  // Exploding Emoji Logic
  emojiBar.addEventListener('click', (e) => {
    if (e.target.classList.contains('emoji')) {
      const clone = document.createElement('div');
      clone.textContent = e.target.textContent;
      clone.className = 'exploding-emoji';

      // Jitter start roughly near original
      const jitterX = (Math.random() - 0.5) * 20;
      clone.style.left = (e.target.offsetLeft + jitterX) + 'px';
      clone.style.top = e.target.offsetTop + 'px';

      emojiBar.appendChild(clone);

      // Cleanup DOM node when animation completes
      setTimeout(() => {
        clone.remove();
      }, 1200);
    }
  });

  // WebGL Boilerplate Setup
  const canvas = document.getElementById('gl-canvas');
  const gl = canvas.getContext('webgl2');
  const draw_element = document.getElementById('draw_element');

  if (!gl) alert('WebGL2 not supported');

  const vsSource = `#version 300 es
layout(location = 0) in vec4 aPosition;
layout(location = 1) in vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
out vec2 vTexCoord;
void main() {
  gl_Position = uProjectionMatrix * uModelViewMatrix * aPosition;
  vTexCoord = aTexCoord;
}`;

  const fsSource = `#version 300 es
precision highp float;
in vec2 vTexCoord;
uniform sampler2D uSampler;
uniform vec4 uColor;
uniform bool uUseTexture;
out vec4 fragColor;
void main() {
  if (uUseTexture) {
    fragColor = texture(uSampler, vTexCoord);
  } else {
    fragColor = uColor;
  }
}`;

  function createShader(gl, type, source) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, source);
    gl.compileShader(shader);
    return shader;
  }

  const program = gl.createProgram();
  gl.attachShader(program, createShader(gl, gl.VERTEX_SHADER, vsSource));
  gl.attachShader(program, createShader(gl, gl.FRAGMENT_SHADER, fsSource));
  gl.linkProgram(program);

  const programInfo = {
    program: program,
    attribs: {
      position: gl.getAttribLocation(program, 'aPosition'),
      texCoord: gl.getAttribLocation(program, 'aTexCoord'),
    },
    uniforms: {
      projection: gl.getUniformLocation(program, 'uProjectionMatrix'),
      modelView: gl.getUniformLocation(program, 'uModelViewMatrix'),
      sampler: gl.getUniformLocation(program, 'uSampler'),
      color: gl.getUniformLocation(program, 'uColor'),
      useTexture: gl.getUniformLocation(program, 'uUseTexture'),
    },
  };

  const positions = new Float32Array([-0.5, 0.5, 0, 0.5, 0.5, 0, -0.5, -0.5, 0, 0.5, -0.5, 0]);
  const texCoords = new Float32Array([0, 0, 1, 0, 0, 1, 1, 1]);

  const positionBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

  const texCoordBuffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
  gl.bufferData(gl.ARRAY_BUFFER, texCoords, gl.STATIC_DRAW);

  const vao = gl.createVertexArray();
  gl.bindVertexArray(vao);
  gl.bindBuffer(gl.ARRAY_BUFFER, positionBuffer);
  gl.enableVertexAttribArray(programInfo.attribs.position);
  gl.vertexAttribPointer(programInfo.attribs.position, 3, gl.FLOAT, false, 0, 0);

  gl.bindBuffer(gl.ARRAY_BUFFER, texCoordBuffer);
  gl.enableVertexAttribArray(programInfo.attribs.texCoord);
  gl.vertexAttribPointer(programInfo.attribs.texCoord, 2, gl.FLOAT, false, 0, 0);

  const texture = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

  // High-res texture for billboard
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 800, 800, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, true);

  const camera = {
    position: glMatrix.vec3.fromValues(0, 2, 8),
    rotation: glMatrix.vec3.fromValues(-0.1, 0, 0),
  };

  const keys = {};
  window.addEventListener('keydown', (e) => keys[e.code] = true);
  window.addEventListener('keyup', (e) => keys[e.code] = false);

  let lastTime = 0;
  function render(time) {
    time *= 0.001;
    const deltaTime = time - lastTime;
    lastTime = time;

    const speed = 5.0 * deltaTime;
    const rotSpeed = 2.0 * deltaTime;
    if (keys['ArrowLeft']) camera.rotation[1] += rotSpeed;
    if (keys['ArrowRight']) camera.rotation[1] -= rotSpeed;
    if (keys['ArrowUp']) camera.rotation[0] += rotSpeed;
    if (keys['ArrowDown']) camera.rotation[0] -= rotSpeed;

    const fwd = glMatrix.vec3.fromValues(-Math.sin(camera.rotation[1]), 0, -Math.cos(camera.rotation[1]));
    const strafe = glMatrix.vec3.fromValues(Math.cos(camera.rotation[1]), 0, -Math.sin(camera.rotation[1]));

    if (keys['KeyW']) { camera.position[0] += fwd[0] * speed; camera.position[2] += fwd[2] * speed; }
    if (keys['KeyS']) { camera.position[0] -= fwd[0] * speed; camera.position[2] -= fwd[2] * speed; }
    if (keys['KeyA']) { camera.position[0] -= strafe[0] * speed; camera.position[2] -= strafe[2] * speed; }
    if (keys['KeyD']) { camera.position[0] += strafe[0] * speed; camera.position[2] += strafe[2] * speed; }

    if (canvas.width !== canvas.clientWidth || canvas.height !== canvas.clientHeight) {
      canvas.width = canvas.clientWidth;
      canvas.height = canvas.clientHeight;
      gl.viewport(0, 0, canvas.width, canvas.height);
    }

    gl.clearColor(0.15, 0.15, 0.15, 1.0);
    gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
    gl.enable(gl.DEPTH_TEST);

    const projectionMatrix = glMatrix.mat4.create();
    glMatrix.mat4.perspective(projectionMatrix, 45 * Math.PI / 180, canvas.width / canvas.height, 0.1, 100.0);

    const viewMatrix = glMatrix.mat4.create();
    glMatrix.mat4.rotateX(viewMatrix, viewMatrix, -camera.rotation[0]);
    glMatrix.mat4.rotateY(viewMatrix, viewMatrix, -camera.rotation[1]);
    glMatrix.mat4.translate(viewMatrix, viewMatrix, glMatrix.vec3.negate(glMatrix.vec3.create(), camera.position));

    gl.useProgram(programInfo.program);
    gl.uniformMatrix4fv(programInfo.uniforms.projection, false, projectionMatrix);
    gl.bindVertexArray(vao);

    // Floor
    const floorMatrix = glMatrix.mat4.clone(viewMatrix);
    glMatrix.mat4.translate(floorMatrix, floorMatrix, [0, -1, 0]);
    glMatrix.mat4.rotateX(floorMatrix, floorMatrix, -Math.PI / 2);
    glMatrix.mat4.scale(floorMatrix, floorMatrix, [20, 20, 1]);
    gl.uniformMatrix4fv(programInfo.uniforms.modelView, false, floorMatrix);
    gl.uniform4f(programInfo.uniforms.color, 0.1, 0.1, 0.12, 1.0);
    gl.uniform1i(programInfo.uniforms.useTexture, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

    // Dynamic Billboard Transform floating in space
    const floatY = Math.sin(time) * 0.2;
    const floatRot = Math.sin(time * 0.5) * 0.05;

    const billboardMatrix = glMatrix.mat4.clone(viewMatrix);
    glMatrix.mat4.translate(billboardMatrix, billboardMatrix, [0, 2.5 + floatY, -5]);
    glMatrix.mat4.rotateY(billboardMatrix, billboardMatrix, floatRot);
    glMatrix.mat4.rotateX(billboardMatrix, billboardMatrix, floatRot * 0.5);
    glMatrix.mat4.scale(billboardMatrix, billboardMatrix, [4.5, 4.5, 1]);

    // Apply exact html-in-canvas element transform mapping
    const mvp = glMatrix.mat4.create();
    glMatrix.mat4.multiply(mvp, projectionMatrix, billboardMatrix);

    const adjustment = glMatrix.mat4.create();
    glMatrix.mat4.translate(adjustment, adjustment, [-0.5, 0.5, 0]);
    glMatrix.mat4.scale(adjustment, adjustment, [1, -1, 1]);
    const finalDrawTransform = glMatrix.mat4.create();
    glMatrix.mat4.multiply(finalDrawTransform, mvp, adjustment);

    if (canvas.getElementTransform) {
      const mvpDOM = new DOMMatrix(Array.from(mvp));
      const width = draw_element.offsetWidth;
      const height = draw_element.offsetHeight;
      const toGLModel = new DOMMatrix()
        .scale(1 / width, -1 / height, 1)
        .translate(-width / 2, -height / 2);
      const toCSSViewport = new DOMMatrix()
        .translate(canvas.width / 2, canvas.height / 2)
        .scale(canvas.width / 2, -canvas.height / 2, 1);

      const finalTransform = toCSSViewport.multiply(mvpDOM).multiply(toGLModel);
      const transform = canvas.getElementTransform(draw_element, finalTransform);
      if (transform) {
        draw_element.style.transform = transform.toString();
      }
    }

    if (gl.texElementImage2D) {
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      gl.texElementImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, draw_element);
    }

    gl.uniformMatrix4fv(programInfo.uniforms.modelView, false, billboardMatrix);
    gl.uniform1i(programInfo.uniforms.useTexture, 1);

    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  requestAnimationFrame(render);
</script>
